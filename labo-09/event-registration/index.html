<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferentie Registratie</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <main class="container">
        <header>
            <img src="./logoipsum-419.png" alt="Logo" class="logo">
            <h1>Conferentie Registratie</h1>
        </header>
        <form action="#" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="full-name">Volledige naam <span class="required">*</span></label>
                    <input type="text" id="full-name" name="full-name" placeholder="Jan Modaal" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mailadres <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="jan@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Wachtwoord <span class="required">*</span></label>
                <input type="password" id="password" name="password" minlength="8" required>
                <small>Minimaal 8 tekens</small>
            </div>

            <div class="form-group">
                <label for="date">Datum van deelname <span class="required">*</span></label>
                <input type="date" id="date" name="date" required>
            </div>

            <fieldset>
                <legend>Ticket type</legend>
                <div class="radio-group">
                    <label><input type="radio" name="ticket" value="early" checked> Early Bird</label>
                    <label><input type="radio" name="ticket" value="regular"> Regular</label>
                    <label><input type="radio" name="ticket" value="vip"> VIP</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Workshops</legend>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="workshops" value="webdesign"> Web Design</label>
                    <label><input type="checkbox" name="workshops" value="backend"> Backend</label>
                    <label><input type="checkbox" name="workshops" value="devops"> DevOps</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="profile-pic">Profielfoto</label>
                <input type="file" id="profile-pic" name="profile-pic">
            </div>

            <div class="form-group">
                <label for="notes">Extra opmerkingen</label>
                <textarea id="notes" name="notes" rows="4"></textarea>
            </div>

            <div class="form-group checkbox-inline">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">Ik ga akkoord met de voorwaarden</label>
            </div>

            <button type="submit">Registreren</button>
        </form>
    </main>
</body>
</html>
